services:
  - type: web
    name: primeconnect-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GRIZZLY_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        fromService:
          type: web
          name: primeconnect-backend
          property: port
